openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Real Estate API - شقق وأراضي المستقبل
servers:
  - url: /api
tags:
  - name: health
  - name: auth
  - name: listings
  - name: employees
  - name: admin
  - name: paid-ads
  - name: stats

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/visitor:
    post:
      operationId: visitorLogin
      tags: [auth]
      summary: Login as visitor or company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisitorLoginRequest"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/staff:
    post:
      operationId: staffLogin
      tags: [auth]
      summary: Login as employee or admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StaffLoginRequest"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      summary: Get listings
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: createdByPhone
          in: query
          schema:
            type: string
        - name: visitorId
          in: query
          schema:
            type: string
        - name: role
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"
    post:
      operationId: createListing
      tags: [listings]
      summary: Create a new listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingRequest"
      responses:
        "201":
          description: Created listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /listings/{id}:
    get:
      operationId: getListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    put:
      operationId: updateListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateListingRequest"
      responses:
        "200":
          description: Updated listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
    delete:
      operationId: deleteListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /listings/{id}/approve:
    post:
      operationId: approveListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /listings/{id}/reject:
    post:
      operationId: rejectListing
      tags: [listings]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"

  /employees:
    get:
      operationId: getEmployees
      tags: [employees]
      responses:
        "200":
          description: List of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"
    post:
      operationId: createEmployee
      tags: [employees]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEmployeeRequest"
      responses:
        "201":
          description: Created employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"

  /employees/{id}:
    put:
      operationId: updateEmployee
      tags: [employees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEmployeeRequest"
      responses:
        "200":
          description: Updated employee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Employee"
    delete:
      operationId: deleteEmployee
      tags: [employees]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/config:
    get:
      operationId: getAdminConfig
      tags: [admin]
      responses:
        "200":
          description: Admin config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfig"
    put:
      operationId: updateAdminConfig
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminConfigRequest"
      responses:
        "200":
          description: Updated admin config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminConfig"

  /paid-ads:
    get:
      operationId: getPaidAds
      tags: [paid-ads]
      responses:
        "200":
          description: List of paid ads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaidAd"
    post:
      operationId: createPaidAd
      tags: [paid-ads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaidAdRequest"
      responses:
        "201":
          description: Created paid ad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaidAd"

  /paid-ads/{id}:
    delete:
      operationId: deletePaidAd
      tags: [paid-ads]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      responses:
        "200":
          description: App statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

  /stats/visitors/reset:
    post:
      operationId: resetVisitorCount
      tags: [stats]
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    VisitorLoginRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [visitor, company]
        visitorId:
          type: string
      required: [name, phone, role]

    StaffLoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [employee, admin]
      required: [username, password, role]

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        role:
          type: string
        name:
          type: string
        id:
          type: integer
        message:
          type: string
      required: [success, role]

    Floor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        area:
          type: string
        price:
          type: string
      required: [name]

    Listing:
      type: object
      properties:
        id:
          type: integer
        cardNumber:
          type: integer
        createdByRole:
          type: string
        ownerType:
          type: string
        propertyType:
          type: string
        region:
          type: string
        projectName:
          type: string
        price:
          type: string
        floor:
          type: string
        area:
          type: string
        description:
          type: string
        ownerName:
          type: string
        ownerPhone:
          type: string
        mapsLink:
          type: string
        images:
          type: array
          items:
            type: string
        floors:
          type: array
          items:
            $ref: "#/components/schemas/Floor"
        status:
          type: string
          enum: [pending, approved, rejected]
        isFeatured:
          type: boolean
        commitment:
          type: boolean
        createdByName:
          type: string
        createdByPhone:
          type: string
        visitorId:
          type: string
        packageType:
          type: string
        packageAmount:
          type: integer
        createdAt:
          type: string
      required: [id, region, status, createdAt, cardNumber]

    CreateListingRequest:
      type: object
      properties:
        createdByRole:
          type: string
        ownerType:
          type: string
        propertyType:
          type: string
        region:
          type: string
        projectName:
          type: string
        price:
          type: string
        floor:
          type: string
        area:
          type: string
        description:
          type: string
        ownerName:
          type: string
        ownerPhone:
          type: string
        mapsLink:
          type: string
        images:
          type: array
          items:
            type: string
        floors:
          type: array
          items:
            $ref: "#/components/schemas/Floor"
        commitment:
          type: boolean
        createdByName:
          type: string
        createdByPhone:
          type: string
        visitorId:
          type: string
        packageType:
          type: string
        packageAmount:
          type: integer
      required: [region, createdByRole]

    UpdateListingRequest:
      type: object
      properties:
        propertyType:
          type: string
        region:
          type: string
        projectName:
          type: string
        price:
          type: string
        floor:
          type: string
        area:
          type: string
        description:
          type: string
        images:
          type: array
          items:
            type: string
        floors:
          type: array
          items:
            $ref: "#/components/schemas/Floor"
        status:
          type: string
        isFeatured:
          type: boolean

    Employee:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
      required: [id, name, username]

    CreateEmployeeRequest:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        password:
          type: string
      required: [name, username, password]

    UpdateEmployeeRequest:
      type: object
      properties:
        name:
          type: string
        username:
          type: string
        password:
          type: string

    AdminConfig:
      type: object
      properties:
        username:
          type: string
        name:
          type: string
      required: [username, name]

    UpdateAdminConfigRequest:
      type: object
      properties:
        name:
          type: string
        password:
          type: string

    PaidAd:
      type: object
      properties:
        id:
          type: integer
        listingId:
          type: integer
        companyName:
          type: string
        phone:
          type: string
        packageType:
          type: string
        amount:
          type: integer
        startDate:
          type: string
        endDate:
          type: string
        status:
          type: string
        region:
          type: string
        propertyType:
          type: string
        cardNumber:
          type: integer
        contactCount:
          type: integer
        createdAt:
          type: string
      required: [id, companyName, packageType, amount, status]

    CreatePaidAdRequest:
      type: object
      properties:
        listingId:
          type: integer
        companyName:
          type: string
        phone:
          type: string
        packageType:
          type: string
        amount:
          type: integer
      required: [companyName, packageType, amount]

    Stats:
      type: object
      properties:
        totalListings:
          type: integer
        pendingListings:
          type: integer
        approvedListings:
          type: integer
        totalVisitors:
          type: integer
        totalEmployees:
          type: integer
        savedCards:
          type: integer
        totalRevenue:
          type: integer
        paidAdsCount:
          type: integer
        companyVisitors:
          type: integer
      required: [totalListings, pendingListings, approvedListings, totalVisitors]
